version: '3.8'

services:

  # ===========================
  # App — Node.js Backend
  # ===========================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: taskflow-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/tododb
      - APP_VERSION=${APP_VERSION:-1.0.0}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - taskflow-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "app=taskflow"
      - "env=production"

  # ===========================
  # MongoDB
  # ===========================
  mongo:
    image: mongo:6.0-focal
    container_name: taskflow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=tododb
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    networks:
      - taskflow-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ===========================
  # Mongo Express (DB UI)
  # ===========================
  mongo-express:
    image: mongo-express:latest
    container_name: taskflow-mongo-ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - taskflow-net

# ===========================
# Volumes
# ===========================
volumes:
  mongo-data:
    driver: local
  mongo-config:
    driver: local

# ===========================
# Networks
# ===========================
networks:
  taskflow-net:
    driver: bridge
